<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI Internship Recommender</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #50e3c2;
            --background-start: #f4f7fc;
            --background-end: #e5eaf5;
            --font-color: #333;
            --card-bg: rgba(255, 255, 255, 0.4);
            --card-border: rgba(255, 255, 255, 0.6);
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--background-start), var(--background-end));
            color: var(--font-color);
            padding-top: 2rem;
            min-height: 100vh;
        }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 2rem;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.2);
            transform: translateY(-5px);
        }
        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .progress-bar {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            transition: width 0.5s ease-in-out;
        }
        .form-label { font-weight: 500; }
        .form-control, .form-select, .form-check-input { transition: all 0.2s ease; }
        .form-control:focus, .form-select:focus, .form-check-input:focus {
            box-shadow: 0 0 0 0.25rem rgba(74, 144, 226, 0.3);
            border-color: var(--primary-color);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #3a7ac8);
            border: none; padding: 12px 30px; font-weight: 600; border-radius: 10px;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4); }
        .btn-outline-primary { border-color: var(--primary-color); color: var(--primary-color); font-weight: 600; }
        .btn-outline-primary:hover { background-color: var(--primary-color); color: white; }
        .recommendation-card { border-left: 5px solid var(--primary-color); }
        .match-badge { font-size: 1rem; background: linear-gradient(135deg, #4CAF50, #2E7D32); }
        .skill-tag-advanced { display: inline-block; padding: 5px 12px; border-radius: 20px; margin: 3px; font-size: 0.85rem; font-weight: 500; }
        .skill-tag-advanced.matched { background-color: #e8f5e9; color: #2e7d32; }
        .skill-tag-advanced.missing { background-color: #fff3e0; color: #e65100; }
        .opportunity-badge { background-color: #e3f2fd; color: #1565c0; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-section, .results-section { animation: fadeIn 0.6s ease-out forwards; }
        .recommendation-card-animation { opacity: 0; animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header text-center">
            <h1><i class="fas fa-robot me-2"></i>Advanced AI Internship Recommender</h1>
            <p class="lead mb-0">Discover your perfect internship with intelligent matching</p>
        </div>
        
        <div class="progress mb-4" style="height: 8px; border-radius: 8px;">
            <div class="progress-bar" role="progressbar" style="width: 33%;"></div>
        </div>
        
        <section id="formSection" class="form-section glass-card mb-5">
            <h3 class="mb-4 d-flex align-items-center">
                <span class="step-icon fa-stack fa-2x me-3">
                    <i class="fas fa-circle fa-stack-2x" style="color: var(--primary-color);"></i>
                    <strong class="fa-stack-1x text-white">1</strong>
                </span>
                Tell Us About Yourself
            </h3>
            
            <form id="internshipForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="education" class="form-label">Education Level</label>
                        <select class="form-select" id="education" required>
                            <option value="">Select your education level...</option>
                            <option value="Bachelor's">Bachelor's Degree</option>
                            <option value="Master's">Master's Degree</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="field" class="form-label">Field of Study</label>
                        <select class="form-select" id="field" required>
                            <option value="">Select your general field...</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3" id="branchContainer" style="display: none;">
                        <label for="branch" class="form-label">Branch or Specialization</label>
                        <select class="form-select" id="branch"></select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Sector Interests</label>
                        <div class="d-flex flex-wrap pt-2">
                            <div class="form-check me-3"><input class="form-check-input" type="radio" name="sector" id="sector1" value="Technology"><label class="form-check-label" for="sector1">Technology</label></div>
                            <div class="form-check me-3"><input class="form-check-input" type="radio" name="sector" id="sector2" value="Healthcare"><label class="form-check-label" for="sector2">Healthcare</label></div>
                            <div class="form-check"><input class="form-check-input" type="radio" name="sector" id="sector4" value="Finance"><label class="form-check-label" for="sector4">Finance</label></div>
                        </div>
                    </div>
                </div>
                
                <div class="mb-3 p-3 bg-light bg-opacity-50 rounded">
                    <label for="resumeInput" class="form-label"><i class="fas fa-file-pdf me-2"></i>Auto-fill skills from your Resume (PDF)</label>
                    <div class="input-group">
                        <input type="file" class="form-control" id="resumeInput" accept=".pdf">
                        <span class="input-group-text" id="resumeStatus" style="min-width: 120px;">Select PDF</span>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Your Skills (review and add any missing)</label>
                    <div id="skillsCheckboxes" class="row p-3 bg-light bg-opacity-50 rounded">
                         <p class="text-muted text-center m-0">Please select a Field of Study to see relevant skills.</p>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="otherSkillsInput" class="form-label">Other Skills (comma-separated)</label>
                    <input type="text" class="form-control" id="otherSkillsInput" placeholder="e.g., Git, Agile, Public Speaking">
                </div>
                
                 <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="state" class="form-label">Preferred Location</label>
                        <select class="form-select" id="state"><option value="">Any location</option></select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="duration" class="form-label">Preferred Duration</label>
                        <select class="form-select" id="duration"><option value="">Any duration</option></select>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-cogs me-2"></i>Generate AI Recommendations
                    </button>
                </div>
            </form>
        </section>
        
        <section id="resultsSection" class="results-section d-none">
             <h3 class="mb-4 d-flex align-items-center">
                <span class="step-icon fa-stack fa-2x me-3">
                    <i class="fas fa-circle fa-stack-2x" style="color: var(--secondary-color);"></i>
                    <strong class="fa-stack-1x text-white">2</strong>
                </span>
                AI-Powered Internship Recommendations
            </h3>
            <div id="recommendationContainer" class="row"></div>
            <div class="text-center mt-4">
                <button id="resetButton" class="btn btn-outline-primary"><i class="fas fa-redo me-2"></i>Start Over</button>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const internshipForm = document.getElementById('internshipForm');
            const submitBtn = internshipForm.querySelector('button[type="submit"]');
            const resultsSection = document.getElementById('resultsSection');
            const formSection = document.getElementById('formSection');
            const progressBar = document.querySelector('.progress-bar');
            const resetButton = document.getElementById('resetButton');
            const recommendationContainer = document.getElementById('recommendationContainer');
            const skillsCheckboxesContainer = document.getElementById('skillsCheckboxes');
            const fieldSelect = document.getElementById('field');
            const branchContainer = document.getElementById('branchContainer');
            const branchSelect = document.getElementById('branch');
            const sectorRadios = document.querySelectorAll('input[name="sector"]');
            const otherSkillsInput = document.getElementById('otherSkillsInput');
            const resumeInput = document.getElementById('resumeInput');
            const resumeStatus = document.getElementById('resumeStatus');

            let allSkills = [];
            let skillMap = { sectors: {}, fields: {}, branches: {} };
            let skillsFromResume = new Set(); // Stores skills from resume to check against later
            
            const fieldToBranchMap = {
                "Engineering": ["Computer Science", "Electronics", "Mechanical", "Civil Engineering"],
                "Business": ["Marketing", "Finance", "Human Resources", "Operations Management"],
                "Science": ["Physics", "Chemistry", "Biology", "Data Science"],
                "Design": ["UI/UX Design", "Graphic Design", "Industrial Design"],
                "Medical": ["Pre-Med", "Nursing", "Pharma", "Biology"],
            };

            function populateDropdown(selectElement, options, placeholder) {
                selectElement.innerHTML = `<option value="">${placeholder}</option>`;
                options.forEach(option => { selectElement.innerHTML += `<option value="${option}">${option}</option>`; });
            }

            function renderSkillCheckboxes(skillsToDisplay) {
                skillsCheckboxesContainer.innerHTML = '';
                if (skillsToDisplay.length === 0) {
                    skillsCheckboxesContainer.innerHTML = `<p class="text-muted text-center m-0">No specific skills found.</p>`;
                    return;
                }
                const columns = 3;
                const skillsPerColumn = Math.ceil(skillsToDisplay.length / columns);
                for (let i = 0; i < columns; i++) {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'col-md-4';
                    const columnSkills = skillsToDisplay.slice(i * skillsPerColumn, (i + 1) * skillsPerColumn);
                    columnSkills.forEach(skill => {
                        const skillId = 'skill-' + skill.toLowerCase().replace(/[^a-z0-9]/g, '');
                        // Check if this skill was found in the resume
                        const isChecked = skillsFromResume.has(skill.toLowerCase());
                        colDiv.innerHTML += `<div class="form-check"><input class="form-check-input" type="checkbox" value="${skill}" id="${skillId}" ${isChecked ? 'checked' : ''}><label class="form-check-label" for="${skillId}">${skill}</label></div>`;
                    });
                    skillsCheckboxesContainer.appendChild(colDiv);
                }
            }
            
            function updateVisibleSkills() {
                const selectedSector = document.querySelector('input[name="sector"]:checked')?.value;
                const selectedField = fieldSelect.value;
                const selectedBranch = branchSelect.value;
                const visibleSkills = new Set();
                if (selectedSector && skillMap.sectors[selectedSector]) skillMap.sectors[selectedSector].forEach(s => visibleSkills.add(s));
                if (selectedField && skillMap.fields[selectedField]) skillMap.fields[selectedField].forEach(s => visibleSkills.add(s));
                if (selectedBranch && skillMap.branches[selectedBranch]) skillMap.branches[selectedBranch].forEach(s => visibleSkills.add(s));
                
                const skillsToRender = visibleSkills.size > 0 ? Array.from(visibleSkills).sort() : allSkills;
                renderSkillCheckboxes(skillsToRender);
            }

            async function initializeForm() {
                try {
                    const response = await fetch('internships.json'); 
                    if (!response.ok) throw new Error('internships.json not found.');
                    const internshipsData = await response.json();
                    
                    const allSkillsSet = new Set(), locations = new Set(), durations = new Set();
                    internshipsData.forEach(({ field, branch, sector, required_skills, location, duration }) => {
                        if (!skillMap.fields[field]) skillMap.fields[field] = new Set();
                        if (branch && !skillMap.branches[branch]) skillMap.branches[branch] = new Set();
                        if (!skillMap.sectors[sector]) skillMap.sectors[sector] = new Set();
                        required_skills.forEach(skill => {
                            const cleanSkill = skill.trim();
                            allSkillsSet.add(cleanSkill);
                            skillMap.fields[field].add(cleanSkill);
                            if(branch) skillMap.branches[branch].add(cleanSkill);
                            skillMap.sectors[sector].add(cleanSkill);
                        });
                        locations.add(location); durations.add(duration);
                    });
                    
                    allSkills = Array.from(allSkillsSet).sort();
                    populateDropdown(document.getElementById('state'), Array.from(locations).sort(), 'Any location');
                    populateDropdown(document.getElementById('duration'), Array.from(durations).sort(), 'Any duration');
                } catch (error) {
                    console.error("Initialization Error:", error);
                    skillsCheckboxesContainer.innerHTML = `<div class="col-12 text-danger"><b>Error:</b> ${error.message}</div>`;
                }
                populateDropdown(fieldSelect, Object.keys(fieldToBranchMap), 'Select your general field...');
            }

            resumeInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file || file.type !== 'application/pdf') {
                    resumeStatus.textContent = 'Invalid File';
                    resumeStatus.classList.remove('text-success', 'text-danger');
                    return;
                }

                resumeStatus.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing...';
                const formData = new FormData();
                formData.append('resume', file);

                try {
                    const response = await fetch('/analyze-resume', { method: 'POST', body: formData });
                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error || 'Analysis failed.');
                    }

                    const data = await response.json();
                    const extractedSkills = data.skills;
                    
                    skillsFromResume.clear(); // Clear previous resume skills
                    const otherSkills = [];
                    const knownSkillsMasterList = new Set(allSkills.map(s => s.toLowerCase()));

                    extractedSkills.forEach(skill => {
                        const skillLower = skill.toLowerCase();
                        if (knownSkillsMasterList.has(skillLower)) {
                            skillsFromResume.add(skillLower); // Add to our set for checking
                        } else {
                            otherSkills.push(skill);
                        }
                    });

                    otherSkillsInput.value = otherSkills.join(', ');
                    updateVisibleSkills(); // Re-render the skills, which will now check the boxes
                    
                    resumeStatus.textContent = 'Skills Filled!';
                    resumeStatus.classList.add('text-success');
                    resumeStatus.classList.remove('text-danger');
                } catch (error) {
                    console.error('Resume analysis error:', error);
                    resumeStatus.textContent = 'Error!';
                    resumeStatus.classList.add('text-danger');
                    resumeStatus.classList.remove('text-success');
                    alert(`Resume Analysis Failed: ${error.message}`);
                }
            });
            
            fieldSelect.addEventListener('change', () => {
                const selectedField = fieldSelect.value;
                if (selectedField && fieldToBranchMap[selectedField]) {
                    populateDropdown(branchSelect, fieldToBranchMap[selectedField], 'Select specialization...');
                    branchContainer.style.display = 'block';
                } else {
                    branchContainer.style.display = 'none'; branchSelect.innerHTML = '';
                }
                updateVisibleSkills();
            });
            branchSelect.addEventListener('change', updateVisibleSkills);
            sectorRadios.forEach(radio => radio.addEventListener('change', updateVisibleSkills));

            internshipForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const checkboxSkills = Array.from(document.querySelectorAll('#skillsCheckboxes input:checked')).map(cb => cb.value);
                const otherSkillsRaw = otherSkillsInput.value.split(',');
                const otherSkillsCleaned = otherSkillsRaw.map(skill => skill.trim()).filter(skill => skill !== "");
                const allUserSkills = [...new Set([...checkboxSkills, ...otherSkillsCleaned])];
                
                const userData = {
                    education: document.getElementById('education').value,
                    field: fieldSelect.value, branch: branchSelect.value,
                    state: document.getElementById('state').value,
                    duration: document.getElementById('duration').value,
                    sector: document.querySelector('input[name="sector"]:checked')?.value || "",
                    skills: allUserSkills
                };

                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Processing...';
                submitBtn.disabled = true;

                try {
                    const response = await fetch('/recommend', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    const recommendations = await response.json();
                    displayRecommendations(recommendations);
                    resultsSection.classList.remove('d-none'); formSection.classList.add('d-none');
                    progressBar.style.width = '100%';
                } catch (error)
                 {
                    console.error("Error fetching recommendations:", error);
                    recommendationContainer.innerHTML = `<div class="col-12"><div class="alert alert-danger"><b>Could not fetch recommendations.</b><br>Please ensure the Python backend server (app.py) is running.</div></div>`;
                    resultsSection.classList.remove('d-none'); formSection.classList.add('d-none');
                } finally {
                    submitBtn.innerHTML = '<i class="fas fa-cogs me-2"></i>Generate AI Recommendations';
                    submitBtn.disabled = false;
                }
            });

            resetButton.addEventListener('click', () => {
                formSection.classList.remove('d-none'); resultsSection.classList.add('d-none');
                progressBar.style.width = '33%'; internshipForm.reset();
                recommendationContainer.innerHTML = ''; branchContainer.style.display = 'none';
                resumeStatus.textContent = 'Select PDF';
                resumeStatus.classList.remove('text-success', 'text-danger');
                skillsFromResume.clear();
                skillsCheckboxesContainer.innerHTML = `<p class="text-muted text-center m-0">Select a Field to see skills.</p>`;
            });

            function displayRecommendations(recommendations) {
                recommendationContainer.innerHTML = '';
                if (!recommendations || recommendations.length === 0) {
                    recommendationContainer.innerHTML = `<div class="col-12"><div class="glass-card text-center"><i class="fas fa-info-circle fa-2x mb-3 text-primary"></i><h4>No Matches Found</h4><p>Your profile didn't match our current listings. Try adjusting your criteria!</p></div></div>`;
                    return;
                }
                recommendations.forEach((internship, index) => {
                    const card = document.createElement('div');
                    card.className = 'col-md-6 col-lg-4 mb-4 recommendation-card-animation';
                    card.style.animationDelay = `${index * 100}ms`;
                    const { matched_skills, missing_skills, is_opportunity } = internship.explainability;
                    const matchedTags = matched_skills.map(skill => `<span class="skill-tag-advanced matched" title="You have this skill"><i class="fas fa-check me-1"></i>${skill}</span>`).join('');
                    const missingTags = missing_skills.map(skill => `<span class="skill-tag-advanced missing" title="A skill you could learn"><i class="fas fa-plus me-1"></i>${skill}</span>`).join('');
                    const opportunityBadge = is_opportunity ? `<span class="badge opportunity-badge" title="Great opportunity to learn!"><i class="fas fa-star me-1"></i>Growth Opportunity</span>` : '';
                    card.innerHTML = `<div class="card recommendation-card h-100 glass-card"><div class="card-body d-flex flex-column"><div class="d-flex justify-content-between align-items-start mb-2"><h5 class="card-title me-2">${internship.title}</h5><span class="badge match-badge text-white">${internship.match}%</span></div><h6 class="card-subtitle mb-2 text-muted">${internship.organization}</h6><div class="mb-2">${opportunityBadge}</div><p class="card-text small">${internship.description}</p><div class="mt-auto"><h6 class="mt-3">Skill Match Breakdown:</h6><div>${matchedTags} ${missingTags}</div></div></div><div class="card-footer bg-transparent border-0"><div class="d-flex justify-content-between text-muted"><small><i class="fas fa-map-marker-alt me-1"></i> ${internship.location}</small><small><i class="fas fa-clock me-1"></i> ${internship.duration}</small></div></div></div>`;
                    recommendationContainer.appendChild(card);
                });
            }
            
            initializeForm();
        });
    </script>
</body>
</html>
